<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d62828" />
    <title>Baeu — Korean Practice</title>
    <meta
      name="description"
      content="Baeu is a daily Korean practice app: mixed Hangul, grammar, and vocabulary questions with spaced-repetition review that targets your weak skills."
    />
    <!-- Open Graph / social preview. The UI language is English (it teaches
         Korean to English speakers), so the document lang stays "en"; Korean
         text is marked with lang="ko" inline. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Baeu — Korean Practice" />
    <meta
      property="og:description"
      content="Daily Korean practice with spaced-repetition review that targets your weak skills."
    />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary" />
    <!-- Apply the saved/OS theme before first paint to avoid a light flash on
         dark-mode loads. Mirrors src/utils/theme.js (resolveTheme/applyTheme). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('baeu-theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', '#0f1115');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
